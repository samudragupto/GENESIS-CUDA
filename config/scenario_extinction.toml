[scenario]
name = "Mass Extinction"
description = "Harsh conditions causing mass die-off - tests survival and recovery"

[world]
size = 1024
water_level = 0.35
mountain_height = 1.0

[terrain]
octaves = 8
lacunarity = 2.0
persistence = 0.5
seed = 55555
erosion_iterations = 100
erosion_droplets = 200000
thermal_erosion_iterations = 50
thermal_erosion_threshold = 0.01

[creatures]
initial_count = 50000
max_count = 500000
initial_species = 50

[climate]
initial_temperature = 40.0
temperature_variation = 30.0
day_length = 2400.0
season_length = 24000.0

[vegetation]
growth_rate = 0.002
spread_rate = 0.001
initial_density = 0.15
max_density = 1.0

[genetics]
mutation_rate = 0.02
crossover_rate = 0.7
speciation_threshold = 0.3

[metabolism]
base_energy_drain = 0.01
eat_energy_gain = 0.3
attack_damage = 0.4
reproduce_energy_cost = 0.3
reproduce_cooldown = 80.0
max_energy = 2.0

[disease]
enabled = false

[rendering]
width = 1920
height = 1080

[simulation]
speed = 2.0
max_ticks = 100000

[output]
directory = "./output/extinction"
auto_save_interval = 3000