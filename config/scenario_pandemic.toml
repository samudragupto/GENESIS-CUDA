[scenario]
name = "Pandemic"
description = "Dense population hit by disease outbreak - tests evolutionary immune response"

[world]
size = 1024
water_level = 0.35
mountain_height = 1.0

[terrain]
octaves = 8
lacunarity = 2.0
persistence = 0.5
seed = 44444
erosion_iterations = 100
erosion_droplets = 200000
thermal_erosion_iterations = 50
thermal_erosion_threshold = 0.01

[creatures]
initial_count = 30000
max_count = 500000
initial_species = 15

[climate]
initial_temperature = 22.0
temperature_variation = 12.0
day_length = 2400.0
season_length = 24000.0

[vegetation]
growth_rate = 0.012
spread_rate = 0.006
initial_density = 0.5
max_density = 2.0

[genetics]
mutation_rate = 0.025
crossover_rate = 0.7
speciation_threshold = 0.3

[metabolism]
base_energy_drain = 0.005
eat_energy_gain = 0.5
attack_damage = 0.3
reproduce_energy_cost = 0.2
reproduce_cooldown = 45.0
max_energy = 2.0

[disease]
enabled = true
start_tick = 1000
transmission_radius = 6.0
transmission_probability = 0.08
infection_duration = 80.0
mortality_rate = 0.15
immunity_duration = 400.0
mutation_chance = 0.02

[rendering]
width = 1920
height = 1080

[simulation]
speed = 1.0
max_ticks = 50000

[output]
directory = "./output/pandemic"
auto_save_interval = 2000